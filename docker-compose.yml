version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/cert:/etc/nginx/cert:ro
    depends_on:
      - api-gateway
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: prod
    image: api-gateway
    volumes:
      - ./services/api-gateway/keys:/app/services/api-gateway/keys:ro
    expose:
      - '3000'
    env_file:
      - services/api-gateway/.env.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-prod-data:

