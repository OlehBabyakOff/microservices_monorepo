version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: dev
    container_name: api-gateway-dev
    volumes:
      - ./services/api-gateway/src:/app/services/api-gateway/src
      - ./services/api-gateway/tsconfig.json:/app/services/api-gateway/tsconfig.json
      - ./services/api-gateway/.env:/app/services/api-gateway/.env
    ports:
      - '3000:3000'
      - '9229:9229'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

