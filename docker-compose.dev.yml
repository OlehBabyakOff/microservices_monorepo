version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: dev
      labels:
        - 'env:dev'
    image: api-gateway:dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '3001:3001'
      - '9229:9229'
    env_file:
      - services/api-gateway/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-dev-data:

